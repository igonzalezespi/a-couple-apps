name: Setup repo
description: Set up Node + pnpm and install dependencies (frozen lockfile, cached).

runs:
  using: composite
  steps:
    # pnpm first so setup-node's pnpm cache can resolve the store. Version comes from
    # package.json "packageManager" (pnpm@10.x), so it is not pinned here.
    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Install Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
