# INTENTIONAL-SPECIFIC: public repo (GitHub-hosted CI only) — permanent free unlimited minutes.
name: Native e2e (label-gated)

# Expensive native Maestro runs. Opt-in: only runs when the PR carries the
# `ci:e2e-native` label, so it never blocks normal PRs and `ci-gate` stays fast.
# It is also WIP: it requires native build config (ios.bundleIdentifier /
# android.package in apps/movies/app.config.ts) which is not set yet (ROADMAP
# Phase 10). The preflight step fails fast with a clear message until then.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: native-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    # Fork-safety guard: this job checks out and EXECUTES the PR's HEAD code
    # (`expo prebuild` + `gradlew` run arbitrary build scripts/plugins). Restrict
    # it to same-repo branches so labelling a fork PR can never run attacker code
    # on the runner. A fork PR that genuinely needs native e2e must have its branch
    # pushed into this repo by a maintainer first.
    if: >-
      contains(github.event.pull_request.labels.*.name, 'ci:e2e-native')
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo

      - name: Preflight (native build config required)
        run: |
          if ! grep -q "android" apps/movies/app.config.ts || ! grep -Eq "package|bundleIdentifier" apps/movies/app.config.ts; then
            echo "::error::Native e2e needs ios.bundleIdentifier / android.package in apps/movies/app.config.ts (ROADMAP Phase 10). Skipping is expected until then."
            exit 1
          fi

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build debug APK (Expo prebuild + Gradle)
        run: |
          pnpm --filter movies exec expo prebuild -p android --no-install
          cd apps/movies/android && ./gradlew assembleDebug

      - name: Run Maestro flow on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r apps/movies/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/movies-watchlist.yaml
