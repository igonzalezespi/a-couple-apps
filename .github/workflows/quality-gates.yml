# INTENTIONAL-SPECIFIC: public repo (GitHub-hosted CI only) — permanent free unlimited minutes.
name: Quality gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR/develop runs on the same ref, but NEVER cancel a main/release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Path-gating (shared detector): classify the PR so a docs-only change runs only doc checks
  # and the heavy jobs (lint/typecheck/test/build/e2e) skip when nothing functional changed. On
  # push/dispatch the gate is bypassed — the full suite always validates the protected line.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      functional: ${{ steps.d.outputs.functional }}
      e2e_relevant: ${{ steps.d.outputs.e2e_relevant }}
      docs: ${{ steps.d.outputs.docs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: d
        uses: igonzalezespi/studio-ci/detect-changes@cf4fc0ce9be8989414d8cf6908ceee21ac2ea33f # v0.3.1
        with:
          # The action's generic defaults miss this repo's layout (scripts/, supabase/,
          # root tool configs, .maestro/), so a PR touching only those would classify as
          # non-functional and merge with every test job skipped. CAVEAT: this input
          # REPLACES the defaults wholesale — every bucket must be restated here; an
          # omitted bucket silently stops matching anything.
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'openspec/**'
              - '.claude/**'
              - '.agents/**'
              - 'skills-lock.json'
              - '.env.example'
            ci:
              - '.github/**'
              - '.husky/**'
              - 'renovate.json'
            deps:
              - '**/pnpm-lock.yaml'
              - '**/package.json'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
              - '.nvmrc'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'supabase/**'
              - 'openspec/schemas/**'
              - 'openspec/templates/**'
              - 'turbo.json'
              - 'tsconfig.json'
              - 'couple.config.example.ts'
              - '*.mjs'
              - '.syncpackrc.mjs'
              - '.maestro/**'
            e2e_relevant:
              - 'apps/**'
              - 'packages/**'
              - 'supabase/migrations/**'
              - '.maestro/**'
            db_migration:
              - 'supabase/migrations/**'
            i18n:
              - '**/locales/**'
              - '**/i18n/**'
            assets:
              - 'assets/**'
              - 'apps/**/assets/**'

  format:
    name: format:check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm format:check

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.functional == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm lint

  typecheck:
    name: typecheck
    needs: changes
    if: needs.changes.outputs.functional == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm typecheck

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.functional == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm test

  build:
    name: build
    needs: changes
    if: needs.changes.outputs.functional == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Stub public env so the export is well-formed; the app reads real values at runtime
    # from each instance's own .env. No secrets needed to verify the bundle builds.
    env:
      EXPO_NO_DOTENV: '1'
      EXPO_PUBLIC_SUPABASE_URL: https://stub.supabase.test
      EXPO_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      EXPO_PUBLIC_TMDB_API_KEY: stub-tmdb-key
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - run: pnpm build

  e2e-web:
    name: e2e-web (Playwright)
    needs: changes
    # docs-only / ci-only → skip; any functional change (incl. deps that can break the bundle) → run.
    if: needs.changes.outputs.functional == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Bound the job — the upstream browser download has hung for hours when run on the
    # bare runner (GitHub's default job timeout is 6h).
    timeout-minutes: 20
    # Official Playwright image, version-matched to @playwright/test in pnpm-lock.yaml.
    # Browsers ship preinstalled (PLAYWRIGHT_BROWSERS_PATH is baked into the image), so
    # the cdn.playwright.dev download — which stalled 5/5 times from hosted runners on
    # 2026-06-03 (connection opens, zero bytes; no stall timeout upstream) — leaves the
    # pipeline entirely. Keep the tag in lockstep with the @playwright/test version.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      # The spec is hermetic (Supabase + TMDB are intercepted; the build uses stub env via
      # playwright.config webServer), so no secrets are required.
      - name: Run web smoke
        run: pnpm --filter movies e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/movies/playwright-report/
            apps/movies/test-results/
          retention-days: 7
          if-no-files-found: ignore

  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # gitleaks-action requires GITHUB_TOKEN to scan pull_request events (the
          # auto-provided token suffices; `contents: read` above is enough).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: commitlint
    # PR-only: validate every commit in the PR range. On push there is no base SHA to
    # diff against (the commit-msg husky hook already gates commits locally).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the base..HEAD range is resolvable
      - uses: ./.github/actions/setup-repo
      - name: Lint PR commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD

  openspec-validate:
    name: openspec:validate
    # PR-only: spec/change artifacts move with PRs. The aggregate ci-gate treats a skipped
    # job as non-failing, so push-to-main stays green without re-validating.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-repo
      - name: Validate OpenSpec specs and changes (strict)
        run: pnpm openspec:validate

  # Single required check (shared composite): green iff every needed job succeeded or was
  # skipped; only failure/cancelled fails it — so path-gated skips never wedge the merge.
  ci-gate:
    name: ci-gate
    if: always()
    needs:
      [
        changes,
        format,
        lint,
        typecheck,
        test,
        build,
        e2e-web,
        secrets,
        commitlint,
        openspec-validate
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: igonzalezespi/studio-ci/ci-gate@cf4fc0ce9be8989414d8cf6908ceee21ac2ea33f # v0.3.1
        with:
          needs-json: ${{ toJSON(needs) }}
