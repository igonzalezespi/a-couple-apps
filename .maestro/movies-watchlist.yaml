# Movies watchlist - native e2e (Maestro).
#
# Mirrors the Playwright web smoke (apps/movies/e2e/movies.spec.ts): pick a person -> search ->
# add -> mark watched. There is no auth -- identity is a local person choice. Runs on a
# simulator/emulator (and the label-gated Android CI job). See .maestro/README.md, then:
#   maestro test .maestro/movies-watchlist.yaml
#
# appId must match apps/movies/app.config.ts (android.package / ios.bundleIdentifier).
appId: com.acouple.movies
---
- launchApp:
    clearState: true # start at the person picker

# No auth: pick which member of the couple you are (couple.config placeholders).
- assertVisible: 'Who is using this?'
- tapOn: 'Person A'

# Home.
- assertVisible: 'Switch person'

# Search and add (the empty-state call to action opens search).
- tapOn: 'Search for a movie'
- tapOn: 'Search movies' # the search field (placeholder)
- inputText: 'matrix'
- pressKey: Enter
- assertVisible: 'The Matrix (1999)'
- tapOn: 'Add'
- assertVisible: 'Added'

# Back on the watchlist, mark it watched.
- tapOn: 'Back'
- assertVisible: 'The Matrix (1999)'
- tapOn: 'Mark watched'
- assertVisible: 'Watched'
